name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: node test-buttons.mjs

      - name: Generate index.html with JSON embedded
        run: |
          FUSEJS_VERSION=$(jq -r '.dependencies["fuse.js"]' package.json)
          jq -c . varhanici-data.json > data.min.json
          GIT_COMMIT_SHORT=$(git rev-parse --short HEAD)
          sed -e "s/__FUSEJS_VERSION__/$FUSEJS_VERSION/" \
              -e "s/__GIT_COMMIT_SHORT__/$GIT_COMMIT_SHORT/g" \
              template.html > template.resolved.html
          awk 'NR==FNR{json=$0; next} {gsub(/__VARHANICI_JSON_DATA__/, json)}1' data.min.json template.resolved.html > public/index.html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
